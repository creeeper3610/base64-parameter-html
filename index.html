<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 URL Decoder</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #errorMessage { color: red; font-weight: bold; }
        /* 展開されたHTMLのコンテナ */
        #renderArea { border: 1px solid #ccc; padding: 15px; border-radius: 4px; min-height: 100px; }
    </style>
</head>
<body>

    <div id="errorMessage"></div>
    <div id="renderArea">パラメータに有効なBase64コードがありません。</div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // 1. URLパラメータから 'html-base64' を取得
            const urlParams = new URLSearchParams(window.location.search);
            const input = urlParams.get('html-base64');

            const errorDiv = document.getElementById('errorMessage');
            const renderDiv = document.getElementById('renderArea');

            if (!input) return;

            try {
                // 2. 提示されたスクリプトと同様のUTF-8デコード処理
                const binaryString = atob(input.trim());
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const decodedHtml = new TextDecoder('utf-8').decode(bytes);

                // 3. デコードされたコンテンツの描画
                // ※文字列として中身を確認したい場合は、以下を renderDiv.textContent = decodedHtml; に変更してください。
                renderDiv.innerHTML = decodedHtml;
                errorDiv.textContent = "";

            } catch (e) {
                errorDiv.textContent = "正しいBase64コードではないか、デコードに失敗しました。";
                renderDiv.textContent = "";
            }
        });
    </script>

</body>
</html>
