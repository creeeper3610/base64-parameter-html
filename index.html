<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 URL Decoder</title>
    <style>
        body { margin: 0; padding: 0; }
    </style>
</head>
<body>

    <!-- エラー時のみここに表示されます -->
    <div id="errorMessage" style="color: red; font-weight: bold; padding: 10px;"></div>
    
    <!-- デコードされたHTMLがそのまま展開されるエリア -->
    <div id="renderArea"></div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            let input = urlParams.get('html-base64');

            if (!input) return;

            // 【重要】URLパラメータの仕様で「+」が「半角スペース」に化けるのを元の「+」に戻します
            input = input.trim().replace(/ /g, '+');

            document.getElementById('errorMessage').textContent = "";

            // 以下、ご提示いただいた「processDecode」のロジックをそのまま実行
            try {
                const binaryString = atob(input);
                const len = binaryString.length;
                const bytes = new Uint8Array(len);
                for (let i = 0; i < len; i++) { 
                    bytes[i] = binaryString.charCodeAt(i); 
                }
                const decodedHtml = new TextDecoder('utf-8').decode(bytes);

                // サイトにそのままhtmlを表示
                document.getElementById('renderArea').innerHTML = decodedHtml;

            } catch (e) {
                document.getElementById('errorMessage').textContent = "正しいBase64コードではありません。";
            }
        });
    </script>

</body>
</html>
